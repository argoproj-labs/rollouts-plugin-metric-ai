apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-analysis-with-agent
  namespace: rollouts-test-system
spec:
  args:
    - name: namespace
  metrics:
    - name: ai-analysis
      provider:
        plugin:
          argoproj-labs/metric-ai:
            # Agent URL is required - all analysis is delegated to the A2A agent
            agentUrl: http://kubernetes-agent:8080
            namespace: "{{args.namespace}}"
            stableLabel: app=rollouts-demo,revision=stable
            canaryLabel: app=rollouts-demo,revision=canary
